$kind: http-request
name: queryBalance
url: "{{host}}/api/php/Payment/testQueryBalance?paymentSupplier=OKPay"
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: paymentSupplier
    value: OKPay
scripts:
